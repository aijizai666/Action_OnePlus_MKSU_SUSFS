name: Build OnePlus_SukiSU Ultra All

on:
  workflow_dispatch:
    inputs:
      CPU:
        type: choice
        description: "分支"
        required: true
        default: sm8550
        options:
          - sm7550
          - sm7675
          - sm8450
          - sm8475
          - sm8550
          - sm8650
          - sm8750
          - sm8850
          - sm8735
      FEIL:
        type: choice
        description: "配置文件"
        required: true
        default: oneplus_ace2_pro_v
        options:
          - oneplus_turbo_6
          - oneplus_nord_ce4_v
          - oneplus_ace_3v_v
          - oneplus_nord_4_v
          - oneplus_10_pro_v
          - oneplus_10t_v
          - oneplus_11r_v
          - oneplus_ace2_v
          - oneplus_ace_pro_v
          - oneplus_11_v
          - oneplus_12r_v
          - oneplus_ace2_pro_v
          - oneplus_ace3_v
          - oneplus_open_v
          - oneplus12_v
          - oneplus_13r
          - oneplus_ace3_pro_v
          - oneplus_ace5
          - oneplus_pad2_v
          - oneplus_13
          - oneplus_13t
          - oneplus_ace5_pro
          - oneplus_pad_2_pro
          - oneplus_pad_3
          - oneplus_15
      CPUD:
        type: choice
        description: "处理器代号"
        required: true
        default: kalama
        options:
          - crow
          - waipio
          - kalama
          - pineapple
          - sun
          - canoe
      ANDROID_VERSION:
        type: choice
        description: "内核安卓版本"
        required: true
        default: android15
        options:
          - android12
          - android13
          - android14
          - android15
          - android16
      KERNEL_VERSION:
        type: choice
        description: "内核版本"
        required: true
        default: "5.15"
        options:
          - "5.10"
          - "5.15"
          - "6.1"
          - "6.6"
          - "6.12"
      BUILD_METHOD:
        type: choice
        description: "编译方式"
        required: true
        default: gki
        options:
          - gki
          - perf
      SUSFS_CI:
        type: boolean
        description: "下载SUSFS模块是否使用CI构建？"
        required: true
        default: true
      VFS:
        type: boolean
        description: "是否启用手动钩子？"
        required: true
        default: true
      KPM:
        type: boolean
        description: "是否启用KPM？"
        required: true
        default: true
      ZRAM:
        type: boolean
        description: "是否启用添加更多的ZRAM算法？"
        required: true
        default: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Maximize build space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 8192
          temp-reserve-mb: 2048
          swap-size-mb: 8192
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'

      - name: Configure Git
        run: |
          git config --global user.name "Builder"
          git config --global user.email "builder@kernel.org"

      - name: Install dependencies
        run: |
          sudo apt update && sudo apt upgrade -y
          sudo apt install -y python3 git curl

      - name: Install repo tool
        run: |
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/repo
          chmod a+x ~/repo
          sudo mv ~/repo /usr/local/bin/repo

      - name: Initialize repo and sync
        run: |
          mkdir kernel_workspace && cd kernel_workspace
          repo init -u https://github.com/OnePlusOSS/kernel_manifest.git -b refs/heads/oneplus/${{ github.event.inputs.CPU }} -m ${{ github.event.inputs.FEIL }}.xml --depth=1
          repo sync
          if [ -e kernel_platform/common/BUILD.bazel ]; then
            sed -i '/^[[:space:]]*"protected_exports_list"[[:space:]]*:[[:space:]]*"android\/abi_gki_protected_exports_aarch64",$/d' kernel_platform/common/BUILD.bazel
          fi
          if [ -e kernel_platform/msm-kernel/BUILD.bazel ]; then
            sed -i '/^[[:space:]]*"protected_exports_list"[[:space:]]*:[[:space:]]*"android\/abi_gki_protected_exports_aarch64",$/d' kernel_platform/msm-kernel/BUILD.bazel
          fi
          rm -f kernel_platform/common/android/abi_gki_protected_exports_* kernel_platform/msm-kernel/android/abi_gki_protected_exports_*

      - name: Force remove -dirty suffix
        run: |
          cd kernel_workspace/kernel_platform
          sed -i 's/ -dirty//g' common/scripts/setlocalversion
          sed -i 's/ -dirty//g' msm-kernel/scripts/setlocalversion
          sed -i 's/ -dirty//g' external/dtc/scripts/setlocalversion
          cd common && git add -A && git commit -m "dirty fix" || true

      - name: Add Docker/BPF Configuration
        run: |
          cd kernel_workspace/kernel_platform
          CONFIG_FILE=./common/arch/arm64/configs/gki_defconfig

          # Docker/容器支持
          echo "CONFIG_PID_NS=y" >> "$CONFIG_FILE"
          echo "CONFIG_IPC_NS=y" >> "$CONFIG_FILE"
          echo "CONFIG_USER_NS=y" >> "$CONFIG_FILE"
          echo "CONFIG_CGROUP_DEVICE=y" >> "$CONFIG_FILE"
          echo "CONFIG_CGROUP_PIDS=y" >> "$CONFIG_FILE"
          echo "CONFIG_VETH=y" >> "$CONFIG_FILE"
          echo "CONFIG_BRIDGE=y" >> "$CONFIG_FILE"
          echo "CONFIG_OVERLAY_FS=y" >> "$CONFIG_FILE"
          echo "CONFIG_BPF_SYSCALL=y" >> "$CONFIG_FILE"
          echo "CONFIG_BPF_JIT=y" >> "$CONFIG_FILE"
          echo "CONFIG_BPF_JIT_ALWAYS_ON=y" >> "$CONFIG_FILE"
          echo "CONFIG_CGROUP_BPF=y" >> "$CONFIG_FILE"
          echo "CONFIG_VXLAN=y" >> "$CONFIG_FILE"
          echo "CONFIG_MACVLAN=y" >> "$CONFIG_FILE"
          echo "CONFIG_IPVLAN=y" >> "$CONFIG_FILE"
          echo "CONFIG_BRIDGE_NETFILTER=y" >> "$CONFIG_FILE"
          echo "CONFIG_IP_VS=y" >> "$CONFIG_FILE"
          echo "CONFIG_DM_THIN_PROVISIONING=y" >> "$CONFIG_FILE"
          echo "CONFIG_NET_IPIP=y" >> "$CONFIG_FILE"
          echo "CONFIG_BINFMT_MISC=y" >> "$CONFIG_FILE"
          echo "CONFIG_CGROUP_HUGETLB=y" >> "$CONFIG_FILE"
          echo "CONFIG_CGROUP_PERF=y" >> "$CONFIG_FILE"
          echo "CONFIG_CFS_BANDWIDTH=y" >> "$CONFIG_FILE"
          echo "CONFIG_DEVPTS_MULTIPLE_INSTANCES=y" >> "$CONFIG_FILE"
          echo "CONFIG_NF_CONNTRACK_BRIDGE=y" >> "$CONFIG_FILE"
          echo "CONFIG_BPF_KPROBE_OVERRIDE=y" >> "$CONFIG_FILE"

          sed -i 's/check_defconfig//' ./common/build.config.gki

      # ==================== 👇 新增步骤开始 ====================
      - name: Prepare build directories
        run: |
          mkdir -p kernel_workspace/out/target/product/${{ github.event.inputs.CPUD }}
          mkdir -p kernel_workspace/device/qcom/${{ github.event.inputs.CPUD }}-kernel
      # ==================== 👆 新增步骤结束 ====================

      - name: Build kernel
        run: |
          cd kernel_workspace
          LTO=thin SYSTEM_DLKM_RE_SIGN=0 BUILD_SYSTEM_DLKM=0 KMI_SYMBOL_LIST_STRICT_MODE=0 ./kernel_platform/oplus/build/oplus_build_kernel.sh ${{ github.event.inputs.CPUD }} ${{ github.event.inputs.BUILD_METHOD }}

      - name: Make AnyKernel3
        run: |
          git clone https://github.com/Numbersf/AnyKernel3 --depth=1
          rm -rf ./AnyKernel3/.git
          dir="kernel_workspace/kernel_platform/out/msm-kernel-${{ github.event.inputs.CPUD }}-${{ github.event.inputs.BUILD_METHOD }}/dist/"
          image_path=$(find "./kernel_workspace/kernel_platform/out/" -name "Image" | head -n 1)
          if [ -n "$image_path" ] && [ -f "$image_path" ]; then
            cp "$image_path" ./AnyKernel3/Image
          else
            echo "Image not found!"
            exit 1
          fi

      - name: Upload AnyKernel3
        uses: actions/upload-artifact@v4
        with:
          name: Kernel-Docker-BPF-sun
          path: ./AnyKernel3/*
